<div class="card p-4 flex items-start gap-3 opacity-60">
  <div class="alert-icon {{ 'alert-icon-warning' if alert.alert_type == 'warning' else 'alert-icon-danger' if alert.alert_type == 'danger' else 'alert-icon-info' }} flex-shrink-0 mt-0.5">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
  </div>
  <div class="flex-1 min-w-0">
    <p class="text-sm">{{ alert.title }}</p>
    {% if alert.message %}
      <p class="text-xs text-muted mt-0.5">{{ alert.message }}</p>
    {% endif %}
    {% if alert.news_items %}
      <p class="text-xs text-muted mt-0.5">Notícia: {{ alert.news_items.title }}</p>
    {% endif %}
    <span class="text-xs text-muted">{{ alert.created_at | datetime_br }}</span>
  </div>
</div>
